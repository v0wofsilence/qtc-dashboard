<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QT Capital</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--black:#000;--b1:#050505;--b2:#0A0A0A;--b3:#0F0F0F;--b4:#141414;--b5:#1A1A1A;--b6:#222;--w:#FFF;--w1:#E5E5E5;--w2:#999;--w3:#666;--w4:#444;--w5:#2A2A2A;--up:#00DC82;--dn:#FF4D4D;--accent:#8CB1F6;--accent2:#6B93D9;--font:'Outfit',sans-serif;--mono:'IBM Plex Mono',monospace}
body{font-family:var(--font);background:var(--black);color:var(--w1);line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:48px;background:var(--b2);border-bottom:1px solid var(--b5)}
.topbar-left{display:flex;align-items:center;gap:1.5rem}
.logo{font-weight:700;font-size:.85rem;letter-spacing:.08em;color:var(--accent)}
.logo span{color:var(--w3);font-weight:400;margin-left:.4rem;letter-spacing:.02em}
.topbar-status{display:flex;align-items:center;gap:.4rem;font-family:var(--mono);font-size:.68rem;color:var(--w3)}
.topbar-status .pulse{width:6px;height:6px;border-radius:50%;background:var(--up);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.topbar-right{font-family:var(--mono);font-size:.7rem;color:var(--w3)}
.main{padding:1.5rem 2rem 4rem;max-width:1400px;margin:0 auto}
.syslog{background:var(--b1);border:1px solid var(--b5);font-family:var(--mono);font-size:.65rem;line-height:1.9;padding:.8rem 1rem;margin-bottom:1.5rem;max-height:140px;overflow-y:auto;color:var(--w3)}
.syslog .ok{color:var(--up)}.syslog .er{color:var(--dn)}.syslog .inf{color:var(--accent)}.syslog .wrn{color:#E5C07B}
.sh{display:flex;align-items:center;gap:.6rem;margin-bottom:.8rem;margin-top:1.8rem}
.sh:first-child{margin-top:0}
.sh-line{flex:1;height:1px;background:var(--b5)}
.sh-label{font-size:.6rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--w3);white-space:nowrap}
.sh-ts{font-family:var(--mono);font-size:.6rem;color:var(--w4)}
.kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:1px;background:var(--b5);border:1px solid var(--b5);margin-bottom:1.5rem}
.kpi{background:var(--b2);padding:1.1rem 1.2rem}
.kpi-l{font-size:.58rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--w3);margin-bottom:.4rem}
.kpi-v{font-family:var(--mono);font-size:1.4rem;font-weight:600;color:var(--w);letter-spacing:-.02em}
.kpi-s{font-family:var(--mono);font-size:.6rem;color:var(--w4);margin-top:.2rem}
.tbl-wrap{border:1px solid var(--b5);background:var(--b2);margin-bottom:1.5rem;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.75rem}
th{text-align:left;padding:9px 14px;font-family:var(--mono);font-size:.58rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--w3);background:var(--b3);border-bottom:1px solid var(--b5)}
td{padding:9px 14px;border-bottom:1px solid var(--b4);color:var(--w2);font-family:var(--mono);font-size:.72rem}
tr:hover td{background:var(--b3)}
.sym{color:var(--w);font-weight:600;font-family:var(--font)}
.tag{display:inline-block;padding:1px 6px;font-size:.6rem;font-weight:600;letter-spacing:.04em;border:1px solid}
.tag-buy{color:var(--up);border-color:rgba(0,220,130,.25);background:rgba(0,220,130,.06)}
.tag-sell{color:var(--dn);border-color:rgba(255,77,77,.25);background:rgba(255,77,77,.06)}
.conn{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1px;background:var(--b5);border:1px solid var(--b5);margin-bottom:1.5rem}
.conn-item{background:var(--b2);padding:.7rem 1.2rem;display:flex;justify-content:space-between;align-items:center}
.conn-item .cl{font-size:.72rem;color:var(--w3)}.conn-item .cv{font-family:var(--mono);font-size:.72rem;font-weight:500;color:var(--w1)}
.conn-item .cv.up{color:var(--up)}.conn-item .cv.dn{color:var(--dn)}
.nil{text-align:center;padding:2.5rem;color:var(--w4);font-size:.78rem;font-style:italic}
@media(max-width:768px){.topbar{padding:0 1rem}.main{padding:1rem 1rem 3rem}.kpis{grid-template-columns:repeat(2,1fr)}.conn{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="topbar"><div class="topbar-left"><div class="logo">QT CAPITAL<span>Terminal</span></div><div class="topbar-status"><div class="pulse" id="dot"></div><span id="statusText">Connecting</span></div></div><div class="topbar-right" id="clock"></div></div>
<div class="main">
<div class="syslog" id="log"></div>
<div id="accountPanel"></div>
<div id="posPanel"></div>
<div id="histPanel"></div>
<div id="metricsPanel"></div>
<div id="connPanel"></div>
</div>
<script>
const $=id=>document.getElementById(id);
const fmt=(n,d=2)=>n!=null?Number(n).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d}):'—';
const ts=()=>new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
setInterval(()=>{const n=new Date();$('clock').textContent=n.toLocaleDateString('en-GB',{weekday:'short',day:'2-digit',month:'short',year:'numeric'})+'  '+n.toLocaleTimeString('en-GB')},1000);
function log(m,c=''){const e=$('log');e.innerHTML+=`<span class="${c}">[${ts()}] ${m}</span>\n`;e.scrollTop=e.scrollHeight}
function setStatus(s,m){const d=$('dot');d.style.background=s==='ok'?'var(--up)':s==='err'?'var(--dn)':'var(--accent)';d.style.animation=s==='ok'?'none':'blink 2s infinite';$('statusText').textContent=m}
async function proxy(e){const r=await fetch('/api/metaapi?endpoint='+e);const d=await r.json();if(!r.ok)throw new Error(d.error||r.status);return d}
(async function(){
  log('Initialising connection...','inf');
  const s={account:false,live:false,positions:false,history:false,metrics:false};
  try{log('Resolving account...','inf');s.account=await proxy('account');log('Account: '+(s.account.name||s.account.login)+' ['+s.account.state+']','ok')}catch(e){log('Account failed: '+e.message,'er');setStatus('err','Disconnected');return}
  try{log('Fetching market data...','inf');s.live=await proxy('account-info');log('Balance: $'+fmt(s.live.balance)+' | Equity: $'+fmt(s.live.equity),'ok')}catch(e){log('Market data: '+e.message,'wrn')}
  try{s.positions=await proxy('positions');log('Positions: '+(Array.isArray(s.positions)?s.positions.length:0)+' open','ok')}catch(e){log('Positions: '+e.message,'wrn')}
  try{const d=await proxy('history');s.history=Array.isArray(d)?d.filter(x=>x.type==='DEAL_TYPE_BUY'||x.type==='DEAL_TYPE_SELL'):[];log('History: '+s.history.length+' deals (30d)','ok')}catch(e){log('History: '+e.message,'wrn')}
  try{s.metrics=await proxy('metrics');log('Analytics loaded','ok')}catch(e){log('Analytics: '+e.message,'wrn')}
  setStatus('ok','Live');log('All systems operational','ok');
  renderAll(s);
  setInterval(async()=>{try{s.live=await proxy('account-info');s.positions=await proxy('positions');renderAccount(s.account,s.live);renderPositions(s.positions)}catch(e){}},15000);
})();
function renderAll(s){renderAccount(s.account,s.live);renderPositions(s.positions);renderHistory(s.history);renderMetrics(s.metrics);renderConnection(s)}
function renderAccount(a,l){
  const bal=l?.balance,eq=l?.equity,upl=(eq!=null&&bal!=null)?eq-bal:null,margin=l?.margin,free=l?.freeMargin,lev=l?.leverage||a?.leverage,name=l?.name||a?.name||a?.login||'—';
  $('accountPanel').innerHTML=`<div class="sh"><span class="sh-label">${name}</span><span class="sh-line"></span><span class="sh-ts">${ts()}</span></div>
  <div class="kpis">
    <div class="kpi"><div class="kpi-l">Balance</div><div class="kpi-v">${bal!=null?'$'+fmt(bal):'—'}</div><div class="kpi-s">${l?.currency||a?.baseCurrency||'USD'}</div></div>
    <div class="kpi"><div class="kpi-l">Equity</div><div class="kpi-v" style="color:${eq>=bal?'var(--up)':'var(--dn)'}">${eq!=null?'$'+fmt(eq):'—'}</div></div>
    ${upl!=null?`<div class="kpi"><div class="kpi-l">Open P&L</div><div class="kpi-v" style="color:${upl>=0?'var(--up)':'var(--dn)'}">${upl>=0?'+':''}$${fmt(upl)}</div><div class="kpi-s">${bal?(upl/bal*100).toFixed(3)+'%':''}</div></div>`:''}
    ${margin!=null?`<div class="kpi"><div class="kpi-l">Margin Used</div><div class="kpi-v">$${fmt(margin)}</div></div>`:''}
    ${free!=null?`<div class="kpi"><div class="kpi-l">Free Margin</div><div class="kpi-v">$${fmt(free)}</div></div>`:''}
    <div class="kpi"><div class="kpi-l">Leverage</div><div class="kpi-v">${lev?'1:'+lev:'—'}</div></div>
  </div>`;
}
function renderPositions(pos){
  const h=`<div class="sh"><span class="sh-label">Open Positions</span><span class="sh-line"></span><span class="sh-ts">${ts()}</span></div>`;
  if(!pos||!Array.isArray(pos)||!pos.length){$('posPanel').innerHTML=h+`<div class="tbl-wrap"><div class="nil">No open positions</div></div>`;return}
  $('posPanel').innerHTML=h+`<div class="tbl-wrap"><table><thead><tr><th>Symbol</th><th>Side</th><th>Volume</th><th>Entry</th><th>Current</th><th>P&L</th><th>Swap</th><th>SL</th><th>TP</th></tr></thead><tbody>${pos.map(p=>{const pnl=p.profit||p.unrealizedProfit||0;const buy=p.type&&p.type.includes('BUY');return`<tr><td class="sym">${p.symbol}</td><td><span class="tag tag-${buy?'buy':'sell'}">${buy?'BUY':'SELL'}</span></td><td>${p.volume??p.currentVolume??'—'}</td><td>${fmt(p.openPrice,5)}</td><td>${fmt(p.currentPrice,5)}</td><td style="color:${pnl>=0?'var(--up)':'var(--dn)'};font-weight:600">${pnl>=0?'+':''}$${fmt(pnl)}</td><td style="color:var(--w4)">${fmt(p.swap||0)}</td><td style="color:var(--w4)">${p.stopLoss?fmt(p.stopLoss,5):'—'}</td><td style="color:var(--w4)">${p.takeProfit?fmt(p.takeProfit,5):'—'}</td></tr>`}).join('')}</tbody></table></div>`;
}
function renderHistory(trades){
  const h=`<div class="sh"><span class="sh-label">Trade History</span><span class="sh-line"></span><span class="sh-label">30 Days</span></div>`;
  if(!trades||!trades.length){$('histPanel').innerHTML=h+`<div class="tbl-wrap"><div class="nil">No closed trades</div></div>`;return}
  trades.sort((a,b)=>new Date(b.time)-new Date(a.time));const show=trades.slice(0,30);
  const totalPnl=trades.reduce((s,t)=>s+(t.profit||0),0),wins=trades.filter(t=>(t.profit||0)>0).length,losses=trades.filter(t=>(t.profit||0)<0).length;
  const wr=trades.length>0?(wins/trades.length*100).toFixed(1):'0';
  const gw=trades.filter(t=>t.profit>0).reduce((s,t)=>s+t.profit,0),gl=Math.abs(trades.filter(t=>t.profit<0).reduce((s,t)=>s+t.profit,0)),pf=gl>0?(gw/gl).toFixed(2):gw>0?'∞':'—';
  $('histPanel').innerHTML=h+`<div class="kpis"><div class="kpi"><div class="kpi-l">Trades</div><div class="kpi-v">${trades.length}</div></div><div class="kpi"><div class="kpi-l">Net P&L</div><div class="kpi-v" style="color:${totalPnl>=0?'var(--up)':'var(--dn)'}">${totalPnl>=0?'+':''}$${fmt(totalPnl)}</div></div><div class="kpi"><div class="kpi-l">Win Rate</div><div class="kpi-v">${wr}%</div><div class="kpi-s">${wins}W ${losses}L</div></div><div class="kpi"><div class="kpi-l">Profit Factor</div><div class="kpi-v">${pf}</div></div></div>
  <div class="tbl-wrap"><table><thead><tr><th>Time</th><th>Symbol</th><th>Side</th><th>Volume</th><th>Price</th><th>P&L</th><th>Comm</th></tr></thead><tbody>${show.map(t=>{const pnl=t.profit||0;const d=new Date(t.time);const buy=t.type==='DEAL_TYPE_BUY';return`<tr><td>${d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'})} ${d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}</td><td class="sym">${t.symbol}</td><td><span class="tag tag-${buy?'buy':'sell'}">${buy?'BUY':'SELL'}</span></td><td>${t.volume??'—'}</td><td>${fmt(t.price,5)}</td><td style="color:${pnl>=0?'var(--up)':'var(--dn)'};font-weight:600">${pnl>=0?'+':''}$${fmt(pnl)}</td><td style="color:var(--w4)">${fmt(t.commission||0)}</td></tr>`}).join('')}</tbody></table></div>`;
}
function renderMetrics(m){
  if(!m||(!m.trades&&!m.profit)){$('metricsPanel').innerHTML='';return}
  $('metricsPanel').innerHTML=`<div class="sh"><span class="sh-label">Analytics</span><span class="sh-line"></span></div><div class="kpis">
    ${m.trades!=null?`<div class="kpi"><div class="kpi-l">Total Trades</div><div class="kpi-v">${m.trades}</div></div>`:''}
    ${m.profit!=null?`<div class="kpi"><div class="kpi-l">Cumulative P&L</div><div class="kpi-v" style="color:${m.profit>=0?'var(--up)':'var(--dn)'}">${m.profit>=0?'+':''}$${fmt(m.profit)}</div></div>`:''}
    ${m.profitFactor!=null?`<div class="kpi"><div class="kpi-l">Profit Factor</div><div class="kpi-v">${fmt(m.profitFactor)}</div></div>`:''}
    ${m.maxDrawdown!=null?`<div class="kpi"><div class="kpi-l">Max Drawdown</div><div class="kpi-v" style="color:var(--dn)">${fmt(m.maxDrawdown)}%</div></div>`:''}
    ${m.sharpeRatio!=null?`<div class="kpi"><div class="kpi-l">Sharpe</div><div class="kpi-v">${fmt(m.sharpeRatio)}</div></div>`:''}
    ${m.sortinoRatio!=null?`<div class="kpi"><div class="kpi-l">Sortino</div><div class="kpi-v">${fmt(m.sortinoRatio)}</div></div>`:''}
    ${m.expectancy!=null?`<div class="kpi"><div class="kpi-l">Expectancy</div><div class="kpi-v">$${fmt(m.expectancy)}</div></div>`:''}
  </div>`;
}
function renderConnection(s){
  const a=s.account;
  $('connPanel').innerHTML=`<div class="sh"><span class="sh-label">System</span><span class="sh-line"></span></div><div class="conn">
    <div class="conn-item"><span class="cl">Account</span><span class="cv">${a?.name||'—'}</span></div>
    <div class="conn-item"><span class="cl">Server</span><span class="cv">${a?.server||'—'}</span></div>
    <div class="conn-item"><span class="cl">Platform</span><span class="cv">${a?.platform||'MT5'}</span></div>
    <div class="conn-item"><span class="cl">Region</span><span class="cv">${a?.region||'—'}</span></div>
    <div class="conn-item"><span class="cl">State</span><span class="cv up">${a?.state||'—'}</span></div>
    <div class="conn-item"><span class="cl">Link</span><span class="cv up">${a?.connectionStatus||'—'}</span></div>
    <div class="conn-item"><span class="cl">Market Data</span><span class="cv ${s.live?'up':'dn'}">${s.live?'LIVE':'OFF'}</span></div>
    <div class="conn-item"><span class="cl">Positions</span><span class="cv ${s.positions?'up':'dn'}">${s.positions?'LIVE':'OFF'}</span></div>
    <div class="conn-item"><span class="cl">History</span><span class="cv ${s.history?'up':'dn'}">${s.history?s.history.length+' DEALS':'OFF'}</span></div>
    <div class="conn-item"><span class="cl">Analytics</span><span class="cv ${s.metrics?'up':'dn'}">${s.metrics?'LOADED':'OFF'}</span></div>
    <div class="conn-item"><span class="cl">Refresh</span><span class="cv">15s</span></div>
    <div class="conn-item"><span class="cl">Proxy</span><span class="cv up">ACTIVE</span></div>
  </div>`;
}
</script>
</body>
</html>
