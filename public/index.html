var bulkRowCount=0;
function addBulkRow(){
  if(bulkRowCount>=20)return;
  bulkRowCount++;
  var i=bulkRowCount-1;
  var card='<div class="bulk-card" id="bulk-card-'+i+'" style="background:var(--b2);border:1px solid var(--b5);border-radius:6px;padding:.7rem .8rem;position:relative">';
  card+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem"><span style="font-family:var(--mono);font-size:.6rem;color:var(--w4);font-weight:600">#'+(i+1)+'</span><span style="cursor:pointer;color:var(--w4);font-size:.8rem" onclick="removeBulkRow('+i+')" title="Remove">\u2715</span></div>';
  card+='<input class="mf-input" id="b-name-'+i+'" placeholder="Trader Name" style="margin-bottom:.4rem;font-size:.72rem;padding:6px 8px">';
  card+='<input class="mf-input" id="b-login-'+i+'" placeholder="Login" style="margin-bottom:.4rem;font-size:.72rem;padding:6px 8px">';
  card+='<input class="mf-input" id="b-server-'+i+'" placeholder="Server" style="margin-bottom:.4rem;font-size:.72rem;padding:6px 8px">';
  card+='<input class="mf-input" id="b-pass-'+i+'" type="password" placeholder="Password" style="margin-bottom:.4rem;font-size:.72rem;padding:6px 8px">';
  card+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:.3rem;margin-bottom:.4rem"><select class="mf-input" id="b-plat-'+i+'" style="font-size:.7rem;padding:5px"><option value="mt5">MT5</option><option value="mt4">MT4</option></select><input class="mf-input" id="b-sal-'+i+'" type="number" placeholder="$3000" value="3000" style="font-size:.7rem;padding:5px"></div>';
  card+='<div id="b-status-'+i+'" style="font-family:var(--mono);font-size:.58rem;min-height:1rem;color:var(--w4)"></div>';
  card+='</div>';
  E('bulk-grid').insertAdjacentHTML('beforeend',card);
  updateBulkCount()}

function removeBulkRow(i){
  var card=E('bulk-card-'+i);if(card)card.remove();
  // Re-count
  bulkRowCount=document.querySelectorAll('.bulk-card').length;
  updateBulkCount()}

function updateBulkCount(){
  var count=document.querySelectorAll('.bulk-card').length;
  bulkRowCount=count;
  var filled=0;
  document.querySelectorAll('.bulk-card').forEach(function(c){
    var idx=c.id.replace('bulk-card-','');
    var name=E('b-name-'+idx);if(name&&name.value.trim())filled++});
  E('bulk-count').textContent=filled+' / '+count+' filled \u00b7 max 20';
}

document.addEventListener('input',function(e){if(e.target.id&&e.target.id.indexOf('b-name-')===0)updateBulkCount()});

async function submitBulk(){
  var rows=[];
  document.querySelectorAll('.bulk-card').forEach(function(c){
    var idx=c.id.replace('bulk-card-','');
    var name=(E('b-name-'+idx)?.value||'').trim();
    var login=(E('b-login-'+idx)?.value||'').trim();
    var server=(E('b-server-'+idx)?.value||'').trim();
    var pass=(E('b-pass-'+idx)?.value||'');
    var plat=(E('b-plat-'+idx)?.value||'mt5');
    var sal=parseInt(E('b-sal-'+idx)?.value)||3000;
    if(name&&login&&server&&pass)rows.push({idx:idx,name:name,login:login,server:server,pass:pass,plat:plat,sal:sal})});
  
  if(!rows.length){alert('No valid rows to submit. Fill in name, login, server, and password.');return}
  if(!confirm('Provision '+rows.length+' trader(s) on MetaAPI?\n\nThis will take roughly '+rows.length*15+' seconds.'))return;
  
  E('bulk-submit').disabled=true;E('bulk-submit').textContent='Provisioning...';
  
  var succeeded=0,failed=0;
  for(var i=0;i<rows.length;i++){
    var r=rows[i];
    var statusEl=E('b-status-'+r.idx);
    if(statusEl){statusEl.style.color='var(--accent)';statusEl.textContent='\u23f3 Provisioning...'}
    E('bulk-progress').innerHTML='<span style="color:var(--accent)">Processing '+(i+1)+' of '+rows.length+': '+r.name+'</span>';
    try{
      var resp=await fetch('/api/metaapi?action=create-account',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:r.name,login:r.login,password:r.pass,server:r.server,platform:r.plat})});
      var d=await resp.json();
      if(!resp.ok||d.error){
        if(statusEl){statusEl.style.color='var(--dn)';statusEl.textContent='\u2717 '+(d.error||'Failed').slice(0,40)}
        failed++}
      else{
        if(statusEl){statusEl.style.color='var(--up)';statusEl.textContent='\u2713 Deployed'}
        S.sal[d.id]={amt:r.sal,status:'active',cycle:30,paid:0,months:0,payments:[],start:new Date().toISOString().slice(0,10),split:50};
        sS();
        succeeded++}
    }catch(e){
      if(statusEl){statusEl.style.color='var(--dn)';statusEl.textContent='\u2717 '+e.message.slice(0,40)}
      failed++}
  }
  
  E('bulk-progress').innerHTML='<span style="color:'+(failed?'var(--warn)':'var(--up)')+'">Complete: '+succeeded+' succeeded, '+failed+' failed. '+(succeeded?'Reloading in 3s...':'')+'</span>';
  E('bulk-submit').textContent='Done';
  if(succeeded>0){setTimeout(function(){location.reload()},3000)}
  else{E('bulk-submit').disabled=false;E('bulk-submit').textContent='Provision All'}
}
